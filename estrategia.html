<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #1C2B1A 0%, #2A3E2A 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            color: #D4AF6A;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            letter-spacing: 0.2em;
        }
        p {
            font-size: 1.1em;
            color: #9A8050;
            margin-bottom: 30px;
        }
        a {
            display: inline-block;
            background: #D4AF6A;
            color: #1C2B1A;
            padding: 15px 40px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1em;
            transition: all 0.3s;

        }
        a:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(212, 175, 106, 0.3);
        }
        .loading {
            animation: pulse 1.5s infinite;
