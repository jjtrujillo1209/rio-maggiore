<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rio Maggiore - Town House 2 Alcobas Story</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --green: #081308;
      --green-soft: #9bb795;
      --ivory: #f5f0e6;
      --gold: #d8c08a;
      --shadow: rgba(2, 6, 3, 0.34);
      --serif: "Cormorant Garamond", Georgia, serif;
      --sans: "Raleway", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: #050805;
      font-family: var(--sans);
      color: var(--ivory);
      -webkit-font-smoothing: antialiased;
    }

    .phone {
      width: min(100vw, 430px);
      aspect-ratio: 9 / 16;
      position: relative;
      overflow: hidden;
      background: var(--green);
      box-shadow: 0 26px 70px rgba(0, 0, 0, 0.36);
      isolation: isolate;
    }

    .phone::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -4;
      background-image: url("assets/renders/town-house-rio-maggiore.png");
      background-size: cover;
      background-repeat: no-repeat;
      background-position: 50% 50%;
      filter: saturate(0.98) contrast(1.05);
    }

    .phone::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -3;
      background:
        linear-gradient(180deg, rgba(4,9,8,0.9) 0%, rgba(4,9,8,0.6) 22%, rgba(4,9,8,0.03) 46%, rgba(4,9,8,0.06) 68%, rgba(4,8,5,0.88) 100%),
        linear-gradient(90deg, rgba(4,9,8,0.16), transparent 28%, transparent 72%, rgba(4,9,8,0.16));
    }

    .grain {
      position: absolute;
      inset: 0;
      opacity: 0.08;
      pointer-events: none;
      mix-blend-mode: soft-light;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 240 240' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='240' height='240' filter='url(%23n)' opacity='.3'/%3E%3C/svg%3E");
    }

    .content {
      position: absolute;
      inset: 34px 32px 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .logo {
      display: grid;
      justify-items: center;
      gap: 7px;
      margin-top: 4px;
      color: var(--ivory);
    }

    .waves {
      width: 86px;
      height: auto;
      opacity: 0.9;
      color: var(--green-soft);
    }

    .brand {
      font-family: var(--serif);
      font-size: 1.52rem;
      font-weight: 500;
      line-height: 0.86;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    .club {
      font-size: 0.46rem;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: rgba(245, 240, 230, 0.74);
    }

    .title-block {
      width: 100%;
      margin-top: 22px;
      padding: 14px 0 12px;
      border-top: 1px solid rgba(245, 240, 230, 0.22);
      border-bottom: 1px solid rgba(245, 240, 230, 0.18);
      background: linear-gradient(90deg, transparent, rgba(3, 8, 6, 0.38), transparent);
    }

    .kicker {
      margin-bottom: 14px;
      color: var(--green-soft);
      font-size: 0.64rem;
      font-weight: 500;
      letter-spacing: 0.38em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-family: var(--serif);
      font-size: 2.48rem;
      font-weight: 300;
      line-height: 0.88;
      letter-spacing: 0;
      text-transform: uppercase;
      color: var(--ivory);
      text-shadow: 0 14px 34px var(--shadow);
    }

    h1 span {
      display: block;
      color: var(--gold);
    }

    .summary {
      margin: 10px auto 0;
      max-width: 292px;
      padding: 7px 12px;
      border: 1px solid rgba(245, 240, 230, 0.14);
      background: rgba(3, 8, 6, 0.42);
      color: rgba(245, 240, 230, 0.92);
      font-size: 0.72rem;
      font-weight: 300;
      line-height: 1.6;
      backdrop-filter: blur(6px);
    }

    .features {
      width: 100%;
      margin-top: auto;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0 16px;
      padding: 6px 14px;
      border: 1px solid rgba(245, 240, 230, 0.2);
      background: rgba(3, 8, 6, 0.68);
      backdrop-filter: blur(10px);
    }

    .feature {
      min-height: 29px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px 0;
      border-bottom: 1px solid rgba(245, 240, 230, 0.16);
      color: rgba(245, 240, 230, 0.94);
      font-size: 0.56rem;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .feature.wide {
      grid-column: 1 / -1;
      border-bottom: 0;
    }

    .spacer {
      display: none;
    }

    .cta {
      width: 100%;
      display: grid;
      gap: 10px;
      margin-top: 14px;
      justify-items: center;
      text-shadow: 0 8px 20px rgba(0, 0, 0, 0.32);
    }

    .location {
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(245, 240, 230, 0.92);
    }

    .button {
      width: min(100%, 292px);
      min-height: 40px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(217, 191, 130, 0.62);
      border-radius: 999px;
      color: var(--ivory);
      background: rgba(3,8,6,0.62);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      backdrop-filter: blur(6px);
    }

    .contact {
      color: rgba(245, 240, 230, 0.7);
      font-size: 0.68rem;
      letter-spacing: 0.08em;
    }

    @media (max-width: 430px) {
      .phone {
        width: 100vw;
        min-height: 100vh;
      }

      .content {
        inset: 42px 28px 38px;
      }
    }
  </style>
</head>
<body>
  <main class="phone" aria-label="Pieza vertical Rio Maggiore Town House 2 Alcobas">
    <div class="grain"></div>
    <section class="content">
      <header class="logo">
        <svg class="waves" viewBox="0 0 240 44" aria-hidden="true">
          <path d="M8,14 C34,2 66,26 100,14 C134,2 168,24 200,12 C212,8 222,10 232,14" stroke="currentColor" stroke-width="4" fill="none" stroke-linecap="round"/>
          <path d="M8,28 C34,16 66,40 100,28 C134,16 168,38 200,26 C212,22 222,24 232,28" stroke="currentColor" stroke-width="4" fill="none" stroke-linecap="round" opacity=".72"/>
        </svg>
        <div class="brand">Rio Maggiore</div>
        <div class="club">Residencial Club</div>
      </header>

      <div class="title-block">
        <div class="kicker">Armenia · Quindio</div>
        <h1>Town<span>House</span></h1>
        <p class="summary">Town House dentro de 240 apartamentos con opciones de 45 m², 90 m² y 120 m².</p>
      </div>

      <div class="features">
        <div class="feature">240 Apartamentos</div>
        <div class="feature">90 m²</div>
        <div class="feature">2 Alcobas</div>
        <div class="feature">2 Banos</div>
        <div class="feature">Balcon</div>
        <div class="feature">Parqueadero</div>
        <div class="feature wide">Uso propio o renta corta</div>
      </div>

      <div class="spacer"></div>

      <footer class="cta">
        <div class="location">Km 7 via La Tebaida</div>
        <div class="button">Agenda tu visita</div>
        <div class="contact">WhatsApp · +57 310 298 1285</div>
      </footer>
    </section>
  </main>
</body>
</html>
